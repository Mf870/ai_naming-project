<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI智能取名</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft YaHei",sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#dfe9f3,#ffffff,#cfd9df);
    padding:30px;
}

.container{
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* 输出框 */
#output{
    width:600px;
    min-height:150px;
    background:#fff;
    border-radius:12px;
    border:1px solid #dcdfe6;
    padding:20px;
    margin-bottom:25px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);

    display:none;
}

/* 表单 */
.form{
    width:550px;
    background:white;
    border-radius:12px;
    padding:25px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.form h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.item{
    margin-bottom:15px;
}

.item label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
    color:#555;
}

.item input,
.item select,
.item textarea{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    outline:none;
}

.item input:focus,
.item select:focus,
.item textarea:focus{
    border-color:#409EFF;
}

textarea{
    resize:none;
}

button{
    margin-top:20px;
    width:100%;
    padding:14px;
    background:#409EFF;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#337ecc;
}

/* 顶部工具栏 */
.toolbar{
    width:550px;
    display:flex;
    justify-content:flex-end;
    margin-bottom:12px;
}

.history-btn{
    width:auto;
    margin-top:0;
    padding:8px 16px;
    font-size:14px;
    background:#fff;
    color:#409EFF;
    border:1px solid #409EFF;
    border-radius:8px;
}

.history-btn:hover{
    background:#ecf5ff;
}

/* 历史记录弹层 */
.mask{
    display:none;
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,.4);
    justify-content:center;
    align-items:center;
    z-index:100;
}

.history-panel{
    width:600px;
    max-height:70vh;
    overflow-y:auto;
    background:#fff;
    border-radius:12px;
    padding:20px 25px;
}

.history-panel h2{
    margin-bottom:15px;
    color:#333;
}

.history-item{
    padding:12px 0;
    border-bottom:1px solid #eee;
}

.history-item:last-child{
    border-bottom:none;
}

.history-item .row1{
    font-weight:bold;
    color:#333;
    margin-bottom:4px;
}

.history-item .row2{
    color:#666;
    font-size:14px;
}

.history-item .row3{
    color:#999;
    font-size:12px;
    margin-top:4px;
}

.close-btn{
    margin-top:20px;
    width:100%;
    padding:10px;
}
</style>
</head>

<body>

<div class="container">

    <!-- 顶部工具栏：查看历史记录按钮 -->
    <div class="toolbar">
        <button class="history-btn" onclick="openHistory()">查看历史</button>
    </div>

    <!-- 历史记录弹层 -->
    <div class="mask" id="historyMask">
        <div class="history-panel">
            <h2>历史取名记录</h2>
            <div id="historyList">加载中...</div>
            <button class="close-btn" onclick="closeHistory()">关闭</button>
        </div>
    </div>
    <!-- 输出框 -->
    <div id="output"></div>

    <div class="form">

        <h2>AI智能取名</h2>

        <div class="item">
            <label>姓氏</label>
            <input id="surname" type="text" placeholder="例如：张">
        </div>

        <div class="item">
            <label>性别</label>
            <select id="gender">
                <option>男</option>
                <option>女</option>
            </select>
        </div>

        <div class="item">
            <label>生日</label>
            <input id="birthday" type="date">
        </div>

        <div class="item">
            <label>出生时辰</label>
            <input id="birthTime" type="text" placeholder="例如：辰时">
        </div>

        <div class="item">
            <label>期望寓意</label>
            <textarea id="meaning" rows="3"
                placeholder="例如：阳光、健康、聪明、有责任心"></textarea>
        </div>

        <div class="item">
            <label>其他要求</label>
            <textarea id="other" rows="3"
                placeholder="例如：名字不要生僻字，希望读起来顺口"></textarea>
        </div>

        <button onclick="generateName()">确认生成</button>

    </div>

</div>

<script>

async function generateName() {

    const surname = document.getElementById("surname").value;
    const gender = document.getElementById("gender").value;
    const birthday = document.getElementById("birthday").value;
    const birthTime = document.getElementById("birthTime").value;
    const meaning = document.getElementById("meaning").value;
    const other = document.getElementById("other").value;

    const output = document.getElementById("output");

    output.style.display = "block";
    output.innerHTML = "<h2>AI正在生成名字，请稍候...</h2>";

    try {

        // 页面由后端 Spring Boot 直接托管（static 目录），
        // 与接口同源，这里用相对路径即可，避免跨域问题
        const response = await fetch("/api/name", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({

                surname: surname,
                gender: gender,
                birthday: birthday,
                birthTime: birthTime,
                meaning: meaning,
                other: other

            })

        });

        const result = await response.json();

        // 后端返回统一格式 { code, msg, data }，先判断 code 是否为 200
        if (result.code !== 200) {
            output.innerHTML = `<h2>生成失败</h2><p>${result.msg}</p>`;
            return;
        }

        let html = "<h2>AI生成结果</h2><br>";

        result.data.names.forEach((item,index)=>{

            html += `
            <h3>推荐名字${index+1}：${item.name}</h3>

            <p><b>寓意：</b>${item.meaning}</p>

            <p><b>推荐理由：</b>${item.reason}</p>

            <p><b>评分：</b>${item.score}</p>

            <hr><br>
            `;

        });

        output.innerHTML = html;

    } catch(e){

        output.innerHTML = "<h2>连接服务器失败！</h2>";

    }

}

// 打开历史记录弹层，并请求后端拉取历史数据
async function openHistory() {

    const mask = document.getElementById("historyMask");
    const list = document.getElementById("historyList");

    mask.style.display = "flex";
    list.innerHTML = "加载中...";

    try {

        const response = await fetch("/api/history");
        const result = await response.json();

        if (result.code !== 200) {
            list.innerHTML = `<p>加载失败：${result.msg}</p>`;
            return;
        }

        const records = result.data;

        if (!records || records.length === 0) {
            list.innerHTML = "<p>暂无历史记录</p>";
            return;
        }

        let html = "";

        records.forEach((item) => {
            html += `
            <div class="history-item">
                <div class="row1">${item.surname}姓 · ${item.gender}</div>
                <div class="row2">推荐名字：${item.generatedNames || "无"}</div>
                <div class="row3">生成时间：${item.createTime}</div>
            </div>
            `;
        });

        list.innerHTML = html;

    } catch (e) {
        list.innerHTML = "<p>连接服务器失败！</p>";
    }

}

// 关闭历史记录弹层
function closeHistory() {
    document.getElementById("historyMask").style.display = "none";
}
</script>

</body>
</html>
